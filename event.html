<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sự kiện | Lâm Đồng Hè 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Serif',sans-serif;background:#FFFFFF;color:#1A1A1A;-webkit-font-smoothing:antialiased;line-height:1.6}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}

:root{
  --cream:#FFFFFF;
  --cream-alt:#FFFFFF;
  --dark:#1E3D2F;
  --dark2:#2A5C3F;
  --teal:#3D8B62;
  --teal2:#2F7244;
  --teal-bg:#E5F3EC;
  --gold:#C9882A;
  --text:#1A1A1A;
  --muted:#5E7A6A;
  --border:#C8E6D4;
  --white:#FFFFFF;
  --line:#A8CDB8;
  --ink:#1E3D2F;
  --ink-soft:#166534;
}


.btn{display:inline-flex;align-items:center;gap:8px;font-family:'Noto Serif',sans-serif;font-size:15px;letter-spacing:.03em;padding:10px 22px;border-radius:50px;border:1.5px solid transparent;transition:all .25s;cursor:pointer;white-space:nowrap}
.btn-ghost{border-color:var(--border);color:var(--muted);background:transparent}
.btn-ghost:hover{border-color:var(--dark);color:var(--dark)}
.btn-dark{background:var(--dark);color:var(--white);border-color:var(--dark)}
.btn-dark:hover{background:var(--teal);border-color:var(--teal)}
.btn-teal{background:var(--teal);color:var(--white);border-color:var(--teal)}
.btn-teal:hover{background:var(--dark);border-color:var(--dark)}
.btn-outline-light{border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.75);background:transparent}
.btn-outline-light:hover{border-color:var(--white);color:var(--white)}
@media(max-width:860px){.nav{padding:0 20px}}

/* EVENT NAV */
.event-nav{position:fixed;bottom:24px;right:32px;z-index:90;display:flex;align-items:center;gap:8px;background:rgba(30,61,47,.90);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.18);border-radius:50px;padding:8px 8px 8px 20px}
.event-nav-inner{display:flex;align-items:center;gap:8px}
.event-nav-toggle{display:none}
/* Mobile: collapsible pill dính cạnh phải */
@media(max-width:580px){
  .event-nav{right:0;bottom:20px;border-radius:50px 0 0 50px;border-right:none;padding:0;gap:0;overflow:hidden}
  /* Toggle nằm bên TRÁI (cạnh bo tròn) */
  .event-nav-toggle{display:flex;align-items:center;justify-content:center;width:44px;height:44px;flex-shrink:0;order:-1;background:transparent;border:none;border-right:1px solid rgba(255,255,255,.15);color:#fff;cursor:pointer;font-size:20px;line-height:1;transition:background .2s}
  .event-nav-toggle:active{background:rgba(255,255,255,.12)}
  /* Nội dung thu/mở với max-width */
  .event-nav-inner{padding:0 12px 0 10px;gap:8px;max-width:260px;overflow:hidden;transition:max-width .35s cubic-bezier(.4,0,.2,1),padding .35s}
  .event-nav.collapsed .event-nav-inner{max-width:0;padding:0}
  .event-nav-label{font-size:11px;white-space:nowrap}
  .event-nav-num{font-size:16px;margin:0 4px;white-space:nowrap}
  .event-nav-btn{width:32px;height:32px;font-size:14px;flex-shrink:0}
}
.event-nav-label{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:.15em;text-transform:uppercase}
.event-nav-num{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:var(--white);margin:0 8px}
.event-nav-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer;font-size:16px}
.event-nav-btn:hover{background:var(--teal);border-color:var(--teal)}
.event-nav-btn.disabled{opacity:.3;pointer-events:none}

/* HERO */
.hero{position:relative;height:100vh;min-height:600px;display:flex;align-items:flex-end;overflow:hidden;background:#134e2a}
.hero::before{content:'';position:absolute;inset:0;filter:brightness(.92) saturate(1.15);background-size:cover;background-position:center;background-repeat:no-repeat}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.0) 0%,rgba(0,0,0,.16) 42%,rgba(0,0,0,.54) 100%)}
.hero-inner{position:relative;z-index:2;max-width:1280px;margin:0 auto;padding:0 48px 56px;width:100%;color:#fff}
.hero .eyebrow{background-color: white;min-height: 30px;padding:0 15px;border-radius:20px;color:var(--ink-soft);margin-bottom:24px;font-weight:800;}
.hero .eyebrow::before{background:var(--dark);min-height: 2px;}
.hero h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(44px,7.2vw,104px);line-height:1;letter-spacing:-.02em;max-width:1100px;text-shadow:0 1px 2px rgba(0,0,0,.5),0 3px 14px rgba(0,0,0,.4),0 10px 40px rgba(0,0,0,.28)}
.hero h1 em{font-style:italic;color:rgba(240,185,70,.95)}
.hero-sub{font-size:22px;font-weight:360;line-height:1.65;max-width:870px;color:rgba(255,255,255,.88);margin-top:24px;text-shadow:0 1px 3px rgba(0,0,0,.5),0 3px 16px rgba(0,0,0,.38)}
.hero-foot{margin-top:48px;display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:24px;padding-top:24px;border-top:1px solid rgba(255,255,255,.18)}
.hero-meta{display:flex;flex-wrap:wrap;gap:36px}
.hero-meta .item .k{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:6px}
.hero-meta .item .v{font-family:'Cormorant Garamond',serif;font-size:22px;color:#fff;letter-spacing:.01em;text-shadow:0 1px 6px rgba(0,0,0,.45)}
.scroll-cue{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.5);writing-mode:vertical-rl;transform:rotate(180deg);position:absolute;right:48px;bottom:56px}
/* Hero tablet */
@media(max-width:860px){
  .hero-inner{padding:0 32px 48px}
  .hero h1{font-size:clamp(38px,6vw,72px)}
  .hero-sub{font-size:20px}
  .scroll-cue{right:24px;bottom:48px}
}
/* Hero mobile */
@media(max-width:580px){
  .hero{height:100svh}
  .hero-inner{padding:0 20px 36px}
  .hero .eyebrow{font-size:10px;margin-bottom:18px}
  .hero h1{font-size:clamp(34px,9vw,52px);line-height:1.02}
  .hero-sub{font-size:18px;margin-top:16px;line-height:1.6;max-width:100%}
  .hero-foot{margin-top:32px;padding-top:20px;gap:16px;flex-direction:column;align-items:flex-start}
  .hero-meta{gap:18px 28px}
  .hero-meta .item .k{font-size:9px;letter-spacing:.25em}
  .hero-meta .item .v{font-size:18px}
  .scroll-cue{display:none}
}

/* SECTIONS */
section{padding:120px 48px}
.wrap{max-width:1280px;margin:0 auto}
.eyebrow{display:inline-flex;align-items:center;gap:12px;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:var(--teal);margin-bottom:22px}
.eyebrow::before{content:'';width:32px;height:1px;background:var(--teal)}
.sh{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(36px,5.2vw,68px);line-height:.97;letter-spacing:-.022em;color:var(--dark)}
.sh em{font-style:italic;color:var(--teal)}
.sh-white{color:var(--white)}
.sh-white em{color:var(--gold)}
.body-text{font-size:21px;line-height:1.82;color:var(--muted);margin-top:24px;font-weight:300}
@media(max-width:768px){section{padding:80px 20px}}

/* NOTE BOX */
.note-box{background:#fff8e6;border-left:4px solid #f59e0b;border-radius:10px;padding:16px 20px;margin-bottom:28px;font-size:17px;color:#78350f;display:flex;align-items:flex-start;gap:10px}
.note-box svg{flex-shrink:0;margin-top:2px}

/* SPLIT */
.split{display:grid;grid-template-columns:1fr 1fr;min-height:100vh}
.split-img{position:relative;overflow:hidden;min-height:460px}
.split-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .9s ease}
.split-img:hover img{transform:scale(1.05)}
.split-img::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.08),transparent 55%),linear-gradient(to top,rgba(0,0,0,.12),transparent 45%)}
.split-content{padding:88px 76px;background:var(--cream);display:flex;flex-direction:column;justify-content:center}
.split-actions{margin-top:40px;display:flex;gap:12px;flex-wrap:wrap}
@media(max-width:860px){.split{grid-template-columns:1fr}.split-img::after{display:none}.split-content{padding:56px 24px}}

/* STATS */
.stats-bar{background:var(--teal2);padding:0}
.stats-grid{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr)}
.stat{padding:72px 56px;border-right:1px solid rgba(255,255,255,.1)}
.stat:last-child{border-right:none}
.stat-n{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(52px,5.5vw,80px);line-height:1;letter-spacing:-.03em;color:var(--white)}
.stat-lbl{font-size:14px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.38);margin-top:18px}
.stat-desc{font-size:17px;line-height:1.6;color:rgba(255,255,255,.32);margin-top:8px;font-weight:300}
@media(max-width:860px){.stats-grid{grid-template-columns:1fr 1fr}.stat:nth-child(2){border-right:none}.stat:nth-child(3){border-right:1px solid rgba(255,255,255,.1)}}
@media(max-width:560px){.stats-grid{grid-template-columns:1fr}.stat{border-right:none;border-bottom:1px solid rgba(255,255,255,.1);padding:44px 24px}}

/* PROGRAM */
.prog-section{background:var(--cream-alt)}
.prog-head{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:end;margin-bottom:72px}
.prog-head-side{font-size:21px;line-height:1.82;color:var(--muted);font-weight:300;max-width:480px;margin-left:auto}
.prog-cards{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.pc{border-radius:16px;overflow:hidden;padding:56px 48px}
.pc-dark{background:var(--dark)}
.pc-teal{background:var(--teal)}
.pc-phase{font-size:14px;letter-spacing:.28em;text-transform:uppercase;margin-bottom:22px}
.pc-dark .pc-phase{color:var(--gold)}
.pc-teal .pc-phase{color:rgba(255,255,255,.6)}
.pc-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(34px,4vw,54px);line-height:.97;letter-spacing:-.02em;color:var(--white);margin-bottom:40px}
.pc-title em{font-style:italic}
.pc-dark .pc-title em{color:rgba(255,190,80,.75)}
.pc-teal .pc-title em{color:rgba(255,255,255,.65)}
.pc-list{border-top:1px solid rgba(255,255,255,.1)}
.pc-teal .pc-list{border-color:rgba(255,255,255,.18)}
.pc-item{padding:20px 0;border-bottom:1px solid rgba(255,255,255,.1);display:flex;gap:20px;align-items:flex-start}
.pc-teal .pc-item{border-color:rgba(255,255,255,.18)}
.pc-item:last-child{border-bottom:none}
.pc-idx{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;min-width:28px;margin-top:2px}
.pc-dark .pc-idx{color:rgba(232,146,46,.45)}
.pc-teal .pc-idx{color:rgba(255,255,255,.35)}
.pc-item-title{font-size:18px;font-weight:500;color:var(--white);margin-bottom:5px}
.pc-item-desc{font-size:17px;line-height:1.62;font-weight:300}
.pc-dark .pc-item-desc{color:rgba(255,255,255,.48)}
.pc-teal .pc-item-desc{color:rgba(255,255,255,.62)}
@media(max-width:860px){.prog-head{grid-template-columns:1fr;gap:32px}.prog-head-side{margin-left:0;max-width:100%}.prog-cards{grid-template-columns:1fr}}
@media(max-width:580px){.pc{padding:36px 24px}}

/* HIGHLIGHTS */
.highlights-section{background:var(--cream)}
.hl-list{margin-top:64px;border-top:1px solid var(--border)}
.hl-item{display:grid;grid-template-columns:80px 1fr;gap:40px;padding:48px 0;border-bottom:1px solid var(--border);transition:opacity .25s}
.hl-item:hover .hl-idx{color:var(--teal);opacity:.8}
.hl-idx{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:36px;color:var(--line);line-height:1;padding-top:4px;transition:all .3s}
.hl-htitle{font-size:14px;letter-spacing:.28em;text-transform:uppercase;color:var(--teal);margin-bottom:18px;font-weight:500}
.hl-body{font-size:21px;line-height:1.82;color:var(--muted);font-weight:300}
.hl-body strong{color:var(--dark);font-weight:500}
@media(max-width:580px){.hl-item{grid-template-columns:52px 1fr;gap:20px;padding:32px 0}.hl-idx{font-size:26px}}

/* CONTENT CARDS */
.content-section{background:var(--cream-alt)}
.content-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;margin-top:64px;background:var(--border);border:1px solid var(--border);border-radius:16px;overflow:hidden}
@media(max-width:860px){.content-grid{grid-template-columns:1fr;border-radius:12px}}
.content-card{background:var(--white);padding:48px 40px;transition:background .25s}
.content-card:hover{background:var(--cream-alt)}
.cc-num{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--teal);opacity:.5;margin-bottom:20px;letter-spacing:.02em}
.cc-icon{width:44px;height:44px;background:var(--teal-bg);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:22px;color:var(--teal)}
.cc-title{font-size:21px;font-weight:500;color:var(--dark);margin-bottom:12px;line-height:1.35}
.cc-body{font-size:19px;line-height:1.82;color:var(--muted);font-weight:300}

/* QUOTE */
.quote-sec{background:var(--teal2);padding:140px 48px;text-align:center;position:relative;overflow:hidden}
.quote-sec::before{content:'\201C';position:absolute;top:-80px;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-size:400px;color:rgba(255,255,255,.05);line-height:1;pointer-events:none}
.quote-inner{position:relative;margin:0 auto}
.quote-text{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:clamp(32px,4.5vw,54px);line-height:1.22;letter-spacing:-.015em;color:var(--white)}
.quote-text strong{font-style:normal;font-weight:500;color:var(--gold)}
.quote-bar{width:48px;height:1px;background:rgba(255,255,255,.2);margin:40px auto}
.quote-attr{font-size:14px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.32)}
@media(max-width:768px){.quote-sec{padding:100px 20px}}

/* DETAILS */
.det-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;margin-top:64px;background:var(--border);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.dc{background:var(--white);padding:44px 40px;transition:background .25s}
.dc:hover{background:var(--cream-alt)}
.dc-icon{width:40px;height:40px;background:var(--teal-bg);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--teal);margin-bottom:20px}
.dc-lbl{font-size:13px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.dc-val{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;line-height:1.25;color:var(--dark);letter-spacing:-.01em}
.dc-note{font-size:17px;color:var(--muted);margin-top:10px;line-height:1.65;font-weight:300}
@media(max-width:860px){.det-cards{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.det-cards{grid-template-columns:1fr}}

/* IMG STRIP */
.img-strip{position:relative;height:480px;overflow:hidden}
.img-strip img{width:100%;height:100%;object-fit:cover;filter:brightness(.72) saturate(1.15);transition:transform 1s ease}
.img-strip:hover img{transform:scale(1.04)}
.img-strip-ov{position:absolute;inset:0;background:linear-gradient(110deg,rgba(0,0,0,.52) 0%,rgba(0,0,0,.18) 50%,rgba(0,0,0,.0) 100%)}
.img-strip-text{position:absolute;inset:0;display:flex;align-items:center;padding:0 80px}
.img-strip-inner{max-width:580px;color:var(--white)}
.img-strip-eyebrow{font-size:13px;letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.42);margin-bottom:24px;display:flex;align-items:center;gap:14px}
.img-strip-eyebrow::before{content:'';width:28px;height:1px;background:rgba(255,255,255,.28);display:inline-block;flex-shrink:0}
.img-strip-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:clamp(30px,4.2vw,56px);line-height:1.12;letter-spacing:-.015em;text-shadow:0 2px 20px rgba(0,0,0,.45)}
@media(max-width:860px){.img-strip{height:400px}.img-strip-text{padding:0 48px}}
@media(max-width:580px){.img-strip{height:300px}.img-strip-text{padding:0 20px}}

/* PARTNERS */
.partners-sec{background:var(--cream-alt)}
.partners-head{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:end;margin-bottom:60px}
.partners-head-side{font-size:21px;line-height:1.82;color:var(--muted);font-weight:300}
.p-list{border-top:1px solid var(--border)}
.p-row{display:grid;grid-template-columns:72px 1fr auto;align-items:center;gap:24px;padding:24px 0;border-bottom:1px solid var(--border);transition:background .2s,padding .2s}
.p-row:hover{background:rgba(61,139,98,.04);padding-left:6px}
.p-num{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;font-style:italic;color:var(--teal);opacity:.6}
.p-name{font-size:20px;font-weight:400;color:var(--dark)}
.p-role{font-size:14px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);text-align:right}
@media(max-width:860px){.partners-head{grid-template-columns:1fr;gap:32px}.partners-head-side{max-width:100%}}
@media(max-width:640px){.p-row{grid-template-columns:52px 1fr}.p-role{display:none}}

/* TAGS */
.tags-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:48px;padding-bottom:16px}
.tag{display:inline-flex;align-items:center;background:transparent;color:var(--muted);font-size:15px;font-weight:400;padding:6px 16px;border-radius:20px;border:1px solid var(--border);transition:all .2s;letter-spacing:.02em}
.tag:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-bg)}

/* CTA */
.cta-sec{position:relative;padding:160px 48px;text-align:center;overflow:hidden}
.cta-bg{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat}
.cta-ov{position:absolute;inset:0;background:rgba(0,0,0,.52)}
.cta-inner{position:relative;z-index:2;max-width:680px;margin:0 auto}
.cta-inner .body-text{color:rgba(255,255,255,.55);margin-left:auto;margin-right:auto}
.cta-btns{margin-top:44px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
@media(max-width:768px){.cta-sec{padding:100px 20px}}


/* ICONS (inline SVG paths) */
svg.ic{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>

<!-- PAGE CONTENT (rendered by JS) -->
<div id="page"></div>

<!-- EVENT NAV (prev/next) -->
<div class="event-nav" id="event-nav">
  <div class="event-nav-inner">
    <span class="event-nav-label">Sự kiện</span>
    <span class="event-nav-num" id="ev-num">01 / 15</span>
    <a href="#" class="event-nav-btn" id="ev-prev" title="Sự kiện trước">&#8592;</a>
    <a href="#" class="event-nav-btn" id="ev-next" title="Sự kiện tiếp">&#8594;</a>
  </div>
  <button class="event-nav-toggle" id="ev-toggle" aria-label="Thu gọn">&#8250;</button>
</div>

<script>
// ─── ICON PATHS ───────────────────────────────────────────────────────────────
const ICONS = {
  calendar: '<path d="M8 2v4M16 2v4"/><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18"/>',
  clock: '<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>',
  'map-pin': '<path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/>',
  monitor: '<rect x="2" y="3" width="20" height="14" rx="2"/><path d="M12 17v4M8 21h8"/>',
  building: '<rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v3M9 6h6M9 10h6M9 14h4"/>',
  building2: '<path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18ZM6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/>',
  layout: '<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>',
  'shopping-bag': '<path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>',
  map: '<polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>',
  image: '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>',
  search: '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>',
  handshake: '<path d="M20.42 4.58a5.4 5.4 0 0 0-7.65 0l-.77.78-.77-.78a5.4 5.4 0 0 0-7.65 7.65l1.06 1.06L12 21.23l7.77-7.77 1.06-1.06a5.4 5.4 0 0 0-.41-7.82z"/>',
  globe: '<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>',
  tag: '<path d="M12 2H2v10l9.29 9.29a1 1 0 0 0 1.41 0l7.29-7.29a1 1 0 0 0 0-1.41z"/><path d="M7 7h.01"/>',
  route: '<circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/>',
  layers: '<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>',
  utensils: '<path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/>',
  'shopping-cart': '<circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>',
  warning: '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
  arrow: '<polyline points="9 18 15 12 9 6"/>',
  'arrow-left': '<polyline points="15 18 9 12 15 6"/>'
};

function icon(name) {
  const d = ICONS[name] || ICONS.building;
  return `<svg class="ic" viewBox="0 0 24 24">${d}</svg>`;
}

// ─── MAIN ─────────────────────────────────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(location.search);
  const rawId = params.get('id') || '01';
  const eventId = rawId.padStart(2, '0');

  let data;
  try {
    const res = await fetch('events-data.json');
    data = await res.json();
  } catch (e) {
    document.getElementById('page').innerHTML = '<div style="padding:200px 48px;text-align:center;font-family:Cormorant Garamond,serif;font-size:32px">Không tải được dữ liệu sự kiện.</div>';
    return;
  }

  const { global: G, events } = data;
  const ev = events.find(e => e.id === eventId);

  if (!ev) {
    document.getElementById('page').innerHTML = `<div style="padding:200px 48px;text-align:center;font-family:Cormorant Garamond,serif;font-size:32px">Không tìm thấy sự kiện <strong>${eventId}</strong>.</div>`;
    return;
  }

  // Update document title
  document.title = `${ev.titleLine1} ${ev.titleLine2} | Lâm Đồng Hè 2026`;

  // Prev/next event navigation
  const idx = events.findIndex(e => e.id === eventId);
  const prevEv = events[idx - 1];
  const nextEv = events[idx + 1];
  document.getElementById('ev-num').textContent = ev.number;
  const prevBtn = document.getElementById('ev-prev');
  const nextBtn = document.getElementById('ev-next');
  if (prevEv) { prevBtn.href = `event.html?id=${prevEv.id}`; } else { prevBtn.classList.add('disabled'); }
  if (nextEv) { nextBtn.href = `event.html?id=${nextEv.id}`; } else { nextBtn.classList.add('disabled'); }

  // Build page
  let html = '';

  // ── HERO
  html += `
  <header class="hero">
    <div class="hero-inner">
      <div class="eyebrow">Sự kiện ${ev.number} &nbsp;·&nbsp; ${ev.type}</div>
      <h1>${ev.titleLine1}<br><em>${ev.titleLine2}</em></h1>
      <p class="hero-sub">${ev.subtitle}</p>
      <div class="hero-foot">
        <div class="hero-meta">
          ${(ev.heroMeta || []).map(m => `
            <div class="item">
              <div class="k">${m.k}</div>
              <div class="v">${m.v}</div>
            </div>`).join('')}
        </div>
      </div>
      <div class="scroll-cue">Cuộn xuống</div>
    </div>
  </header>`;

  // ── NOTE BOX (if exists) + OVERVIEW SPLIT
  if (ev.overviewBody || ev.note) {
    html += `<section id="overview" style="padding:0">
      <div class="split">
        <div class="split-img">
          <img src="${(ev.images && ev.images.overview) || (ev.images && ev.images.hero) || ''}" alt="${ev.titleLine1}" loading="lazy">
        </div>
        <div class="split-content">
          ${ev.note ? `<div class="note-box">${icon('warning')}<div>${ev.note}</div></div>` : ''}
          <div class="eyebrow">Giới thiệu</div>
          <h2 class="sh" style="font-size:clamp(32px,4vw,56px)">${ev.overviewTitle}</h2>
          ${(ev.overviewBody || []).map((p, i) => `<p class="body-text"${i > 0 ? ' style="margin-top:16px"' : ''}>${p}</p>`).join('')}
          <div class="split-actions">
            <a href="#details" class="btn btn-dark">Xem chi tiết</a>
            <a href="#partners" class="btn btn-ghost">Đơn vị tổ chức</a>
          </div>
        </div>
      </div>
    </section>`;
  }

  // ── FACTS/STATS BAR
  if (ev.facts && ev.facts.length) {
    html += `<section class="stats-bar" style="padding:0">
      <div class="stats-grid">
        ${ev.facts.map(f => `
          <div class="stat">
            <div class="stat-n">${f.num}</div>
            <div class="stat-lbl">${f.lbl}</div>
            <div class="stat-desc">${f.desc}</div>
          </div>`).join('')}
      </div>
    </section>
    <div class="img-strip">
      <img src="${(ev.images && ev.images.strip) || (ev.images && ev.images.hero) || ''}" alt="" loading="lazy">
      <div class="img-strip-ov"></div>
      <div class="img-strip-text">
        <div class="img-strip-inner">
          <div class="img-strip-eyebrow">Lâm Đồng · Hè 2026</div>
          <div class="img-strip-title">"Săn mây ngàn,<br>lướt sóng bạc."</div>
        </div>
      </div>
    </div>`;
  }

  // ── PROGRAM
  if (ev.program && ev.program.length) {
    html += `<section id="program" class="prog-section">
      <div class="wrap">
        <div class="prog-head">
          <div>
            <div class="eyebrow">Nội dung chương trình</div>
            <h2 class="sh">${ev.programTitle || 'Chương trình <em>chi tiết</em>.'}</h2>
          </div>
          <p class="prog-head-side">${ev.programDesc || 'Chương trình được dàn dựng công phu với các hoạt động đặc sắc mang đậm bản sắc văn hóa Lâm Đồng.'}</p>
        </div>
        <div class="prog-cards">
          ${ev.program.map(ph => `
            <article class="pc ${ph.dark ? 'pc-dark' : 'pc-teal'}">
              <div class="pc-phase">${ph.phase}</div>
              <h3 class="pc-title">${ph.title}</h3>
              <div class="pc-list">
                ${(ph.steps || []).map((s, i) => `
                  <div class="pc-item">
                    <span class="pc-idx">0${i + 1}</span>
                    <div>
                      <div class="pc-item-title">${s.title}</div>
                      <div class="pc-item-desc">${s.desc}</div>
                    </div>
                  </div>`).join('')}
              </div>
            </article>`).join('')}
        </div>
      </div>
    </section>`;
  }

  // ── HIGHLIGHTS (for events without formal programs)
  if (ev.highlights && ev.highlights.length && !ev.program) {
    html += `<section class="highlights-section">
      <div class="wrap">
        <div class="eyebrow">Thông tin sự kiện</div>
        <h2 class="sh">Những điều cần <em>biết</em>.</h2>
        <div class="hl-list">
          ${ev.highlights.map((h, i) => `
            <div class="hl-item">
              <div class="hl-idx">0${i + 1}</div>
              <div>
                ${h.title ? `<div class="hl-htitle">${h.title}</div>` : ''}
                <p class="hl-body">${h.body}</p>
              </div>
            </div>`).join('')}
        </div>
      </div>
    </section>`;
  }

  // ── CONTENT CARDS
  if (ev.contentCards && ev.contentCards.length) {
    html += `<section class="content-section">
      <div class="wrap">
        <div class="eyebrow">Nội dung hoạt động</div>
        <h2 class="sh">Các hạng mục <em>chính</em>.</h2>
        <div class="content-grid">
          ${ev.contentCards.map((c, i) => `
            <div class="content-card">
              <div class="cc-num">0${i + 1}</div>
              <div class="cc-icon">${icon(c.icon)}</div>
              <div class="cc-title">${c.title}</div>
              <p class="cc-body">${c.body}</p>
            </div>`).join('')}
        </div>
      </div>
    </section>`;
  }

  // ── HIGHLIGHTS after program (for events with both)
  if (ev.highlights && ev.highlights.length && ev.program) {
    html += `<section class="highlights-section">
      <div class="wrap">
        <div class="eyebrow">Điểm nhấn</div>
        <h2 class="sh">Những điều <em>đáng chú ý</em>.</h2>
        <div class="hl-list">
          ${ev.highlights.map((h, i) => `
            <div class="hl-item">
              <div class="hl-idx">0${i + 1}</div>
              <div>
                ${h.title ? `<div class="hl-htitle">${h.title}</div>` : ''}
                <p class="hl-body">${h.body}</p>
              </div>
            </div>`).join('')}
        </div>
      </div>
    </section>`;
  }

  // ── QUOTE
  html += `<section class="quote-sec">
    <div class="quote-inner">
      <div class="quote-text">"${G.quote.replace(G.quoteHighlight, `<strong>${G.quoteHighlight}</strong>`)}"</div>
      <div class="quote-bar"></div>
      <div class="quote-attr">${G.quoteAttr}</div>
    </div>
  </section>`;

  // ── DETAILS
  if (ev.details && ev.details.length) {
    html += `<section id="details">
      <div class="wrap">
        <div class="eyebrow">Thông tin sự kiện</div>
        <h2 class="sh">Những chi tiết cần <em>lưu tâm</em>.</h2>
        <div class="det-cards">
          ${ev.details.map(d => `
            <div class="dc">
              <div class="dc-icon">${icon(d.icon)}</div>
              <div class="dc-lbl">${d.t}</div>
              <div class="dc-val">${d.v}</div>
              <div class="dc-note">${d.n}</div>
            </div>`).join('')}
        </div>
      </div>
    </section>`;
  }

  // ── TAGS
  if (ev.tags && ev.tags.length) {
    html += `<section style="padding:24px 48px 48px">
      <div class="wrap">
        <div class="tags-wrap">
          ${ev.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
    </section>`;
  }

  // ── PARTNERS
  if (ev.partners && ev.partners.length) {
    html += `<section id="partners" class="partners-sec">
      <div class="wrap">
        <div class="partners-head">
          <div>
            <div class="eyebrow">Tổ chức thực hiện</div>
            <h2 class="sh">Các đơn vị <em>đồng hành</em>.</h2>
          </div>
          <p class="partners-head-side">Sự kiện là kết quả phối hợp của nhiều cơ quan, đơn vị chuyên môn và đối tác trong lĩnh vực văn hóa – du lịch – truyền thông, cùng hướng tới mục tiêu phát triển du lịch bền vững cho Lâm Đồng.</p>
        </div>
        <div class="p-list">
          ${ev.partners.map((p, i) => `
            <div class="p-row">
              <div class="p-num">0${i + 1}</div>
              <div class="p-name">${p.name}</div>
              <div class="p-role">${p.role}</div>
            </div>`).join('')}
        </div>
      </div>
    </section>`;
  }

  // ── CTA
  const ctaBg = (ev.images && ev.images.strip) || (ev.images && ev.images.hero) || '';
  html += `<section id="register" class="cta-sec">
    <div class="cta-bg" style="${ctaBg ? `background-image:url('${ctaBg}')` : ''}"></div>
    <div class="cta-ov"></div>
    <div class="cta-inner">
      <div class="eyebrow" style="justify-content:center;color:var(--gold)">Gửi lời mời tham dự</div>
      <h2 class="sh sh-white">${G.ctaTitle.replace('bắt đầu', '<em>bắt đầu</em>')}</h2>
      <p class="body-text">${G.ctaBody}</p>
      <div class="cta-btns">
        <a href="#" class="btn btn-teal" style="font-size:14px;padding:14px 34px">Đăng ký ngay</a>
        <a href="index.html" class="btn btn-outline-light" style="font-size:14px;padding:14px 34px">Xem các sự kiện khác</a>
      </div>
    </div>
  </section>`;

  // ── FOOTER
  const otherEvents = events.filter((_, i) => i !== idx).slice(0, 4);
  html += `<footer>
    <div class="foot-grid">
      <div>
        <div class="foot-brand">Lâm Đồng <em>Hè 2026</em></div>
        <p class="foot-tag">Chuỗi hoạt động "Chào Mùa Du Lịch Hè 2026" do UBND tỉnh Lâm Đồng chỉ đạo, Sở Văn hóa, Thể thao và Du lịch chủ trì tổ chức.</p>
      </div>
      <div class="foot-col">
        <h6>Sự kiện khác</h6>
        ${otherEvents.map(e => `<a href="event.html?id=${e.id}">SK ${e.id} · ${e.titleLine1}</a>`).join('')}
        <a href="index.html">Xem tất cả →</a>
      </div>
      <div class="foot-col">
        <h6>Nội dung</h6>
        <a href="#overview">Tổng quan</a>
        ${ev.program ? '<a href="#program">Chương trình</a>' : ''}
        <a href="#details">Chi tiết</a>
        <a href="#partners">Đơn vị tổ chức</a>
      </div>
      <div class="foot-col">
        <h6>Liên hệ</h6>
        <a href="#">Sở VH–TT&DL Lâm Đồng</a>
        <a href="#">Truyền thông báo chí</a>
        <a href="#">Đối tác đồng hành</a>
      </div>
    </div>
    <div class="foot-bot">
      <span>© 2026 UBND tỉnh Lâm Đồng — Mọi quyền được bảo lưu.</span>
      <span>Sự kiện ${ev.number}</span>
    </div>
  </footer>`;

  document.getElementById('page').innerHTML = html;

  // Inject per-event hero image
  if (ev.images && ev.images.hero) {
    const s = document.createElement('style');
    s.textContent = `.hero::before{background-image:url('${ev.images.hero}')}`;
    document.head.appendChild(s);
  }

}

init();

// Mobile event-nav toggle (toggle nằm bên trái)
(function(){
  const toggle = document.getElementById('ev-toggle');
  const nav = document.getElementById('event-nav');
  if(!toggle) return;
  // Bắt đầu ở trạng thái thu gọn trên mobile
  if(window.innerWidth <= 580){
    nav.classList.add('collapsed');
    toggle.innerHTML = '&#8250;'; // › mở ra
  }
  toggle.addEventListener('click', () => {
    const collapsed = nav.classList.toggle('collapsed');
    toggle.innerHTML = collapsed ? '&#8250;' : '&#8249;'; // › thu | ‹ mở
  });
})();
</script>
</body>
</html>
